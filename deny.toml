# cargo-deny configuration. See https://embarkstudios.github.io/cargo-deny/

[advisories]
version = 2
yanked = "deny"
# Accepted advisories with no actionable fix:
# - RUSTSEC-2025-0134: rustls-pemfile is unmaintained. It is pulled in transitively
#   by the rustls TLS stack; its functionality moved into rustls-pki-types and there
#   is no safe drop-in upgrade at our pinned rustls major. It is an unmaintained
#   notice, not a vulnerability. Revisit when the rustls stack drops the dependency.
ignore = ["RUSTSEC-2025-0134"]

[licenses]
version = 2
# Permissive licenses acceptable for an Apache-2.0 project.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
