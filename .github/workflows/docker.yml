name: Docker

on:
  push:
    branches: [main]
  pull_request:

env:
  DOCKER_BUILDKIT: 1

jobs:
  docker:
    name: build image + smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t auradb:ci .

      - name: Smoke test (version)
        run: docker run --rm auradb:ci auradb version
