name: Docker

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

env:
  DOCKER_BUILDKIT: 1
  IMAGE: ghcr.io/ohswedd/auradb

jobs:
  build:
    name: build image + smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t auradb:ci .

      - name: Smoke test (version)
        run: docker run --rm auradb:ci auradb version

      - name: Smoke test (server health)
        run: |
          docker run -d --name auradb-smoke -p 7171:7171 auradb:ci
          ok=0
          for _ in $(seq 1 30); do
            if docker run --rm --network host auradb:ci auradb status --addr 127.0.0.1:7171; then
              ok=1; break
            fi
            sleep 1
          done
          docker logs auradb-smoke
          docker rm -f auradb-smoke
          test "$ok" = "1"

  publish:
    name: publish to GHCR
    runs-on: ubuntu-latest
    # Only publish images for version tags (v*).
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=ref,event=tag
            type=sha,prefix=sha-,format=short

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
