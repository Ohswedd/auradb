name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-test:
    name: build, lint, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Test
        # Includes the MVCC/snapshot-isolation and planner suites; the v0.3.1
        # transaction-lifecycle, GC-validation, planner-regression, and
        # EXPLAIN-ANALYZE suites; the v0.1.0/v0.2.x/v0.3.0 upgrade tests;
        # backup/restore combined with GC; the benchmark-compare unit tests;
        # conformance; and chaos restart integration tests.
        run: cargo test --workspace --all-features

      - name: Build
        run: cargo build --workspace --all-features

      - name: Compile benchmarks
        run: cargo bench --workspace --benches --no-run
