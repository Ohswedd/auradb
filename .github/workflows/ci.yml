name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-test:
    name: build, lint, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Test
        # Includes the MVCC/snapshot-isolation and planner suites; the v0.3.1
        # transaction-lifecycle, GC-validation, planner-regression, and
        # EXPLAIN-ANALYZE suites; the v0.1.0/v0.2.x/v0.3.0/v0.4.0/v0.4.1 upgrade
        # tests; backup/restore combined with GC; the benchmark-compare unit
        # tests; conformance; chaos restart integration tests; the v0.4.0 cluster
        # metadata, Raft log, deterministic Raft consensus, replicated-apply,
        # snapshot, and single-node cluster-mode suites; and the v0.4.1 Raft
        # log-compaction, snapshot-restore-edge-case, apply-idempotency,
        # cluster-metadata-corruption, peer-validation, deterministic partition,
        # and `not_leader` over-the-wire suites; and the v0.5.0 multi-node preview
        # suites: peer-transport framing/handshake, the cross-process Raft and
        # replication tests over real TCP sockets, the server-level multi-node AWP
        # routing tests, and the live cluster CLI tests. A dedicated cluster.yml
        # workflow runs the multi-node integration suites in isolation as well.
        #
        # v0.8.0 adds: the storage corruption drills (check.rs) and structured
        # `check --json`; the backup/restore drills (backup_drills.rs) and
        # `backup verify`; the upgrade drills into v0.8.0 over genuine fixtures
        # (upgrade_to_v0_8_0.rs); the resource-limit tests (limits.rs); and the
        # CI-safe large-dataset smokes (large_dataset.rs). The 100k large-dataset
        # stress and the soak harnesses are #[ignore]d / manual and are not part of
        # this required run.
        #
        # Integration tests run serially (--test-threads=1): the process-level
        # multi-node cluster tests spawn real servers on reserved loopback ports
        # and multi-threaded Raft runtimes, so running them in parallel on a
        # few-core runner can race on port reservation or starve a cluster's
        # driver. Unit and doc tests still run in parallel.
        run: |
          cargo test --workspace --all-features --lib --bins
          cargo test --workspace --all-features --doc
          cargo test --workspace --all-features --tests -- --test-threads=1

      - name: Build
        run: cargo build --workspace --all-features

      - name: Compile benchmarks
        run: cargo bench --workspace --benches --no-run

      - name: Benchmark comparator smoke
        # Validate the committed v0.8.0 baseline JSON and the regression comparator
        # without running the (hardware-sensitive) benchmarks: a self-comparison is
        # a stable 0% regression and exercises the tool and the baseline shape.
        run: |
          python3 scripts/compare_benchmarks.py \
            benches/baseline/v0.8.0.json benches/baseline/v0.8.0.json \
            --fail-threshold-percent 5
