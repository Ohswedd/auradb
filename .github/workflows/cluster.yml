name: Cluster preview

# Exercises the EXPERIMENTAL multi-node server preview: the cross-process peer
# transport, real leader election and replication over loopback TCP sockets, the
# live cluster CLI commands, and the Docker Compose cluster definition.
#
# These tests bind real loopback sockets and use readiness checks with bounded
# polling (no fixed sleeps). They run on push, on PRs, and on demand.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  multi-node:
    name: multi-node preview tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build workspace
        run: cargo build --workspace --all-features

      - name: Peer transport unit tests
        run: cargo test -p auradb-replication transport

      - name: Cross-process Raft + replication (real TCP sockets)
        # Run serially: these are heavy process-level cluster tests (each spawns a
        # multi-threaded runtime and Raft driver tasks). Running them in parallel
        # on a few-core runner can starve a cluster's driver enough to exceed a
        # commit timeout, so serialize them for a stable signal.
        run: cargo test -p auradb-replication --test multi_node -- --test-threads=1

      - name: Long-running cluster tests (manual)
        # The heaviest variants (e.g. 1,000-entry follower catch-up) are
        # `#[ignore]`d so the default suite stays stable under CI parallelism.
        # Run them serially on demand via "Run workflow".
        if: github.event_name == 'workflow_dispatch'
        run: cargo test -p auradb-replication --test multi_node -- --ignored --test-threads=1

      - name: Server-level multi-node preview (AWP routing)
        run: cargo test -p auradb-server --test cluster_preview

      - name: Peer TLS validation (wrong CA / SAN, rotation)
        run: cargo test -p auradb-server --test peer_tls

      - name: Generated dev certs form a real TLS cluster (mutual TLS)
        run: cargo test -p auradb-cli --test peer_tls_cluster

      - name: not_leader ergonomics
        run: cargo test -p auradb-server --test not_leader

      - name: Live cluster CLI commands
        run: cargo test -p auradb-cli --test cluster_cli

      - name: Validate example configs
        run: |
          cargo run -p auradb-cli -- config validate --config examples/cluster/node1.toml
          cargo run -p auradb-cli -- config validate --config examples/cluster/node2.toml
          cargo run -p auradb-cli -- config validate --config examples/cluster/node3.toml

      - name: Validate Docker Compose cluster definition
        run: docker compose -f docker-compose.cluster.yml config

  local-three-node-smoke:
    name: three-node loopback smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build CLI
        run: cargo build -p auradb-cli

      - name: Start a three-node loopback cluster and elect a leader
        run: |
          set -eu
          ./target/debug/auradb server --config examples/cluster/node1.toml > node1.log 2>&1 &
          ./target/debug/auradb server --config examples/cluster/node2.toml > node2.log 2>&1 &
          ./target/debug/auradb server --config examples/cluster/node3.toml > node3.log 2>&1 &
          ./target/debug/auradb cluster wait-leader --addr 127.0.0.1:7171 --timeout-secs 30
          # Live cluster diagnostics: `cluster status --addr` queries the running
          # server (role, leader, quorum, indices, per-peer state). The offline
          # `cluster status --data-dir` view reads on-disk metadata.
          ./target/debug/auradb cluster status --addr 127.0.0.1:7171 --json
          ./target/debug/auradb status --addr 127.0.0.1:7171 --json
          ./target/debug/auradb cluster leader --addr 127.0.0.1:7171

      - name: Tear down
        if: always()
        run: pkill -f 'auradb server --config examples/cluster' || true

  compose-live-smoke:
    name: Docker Compose live smoke (manual)
    # Opt-in only: the live Docker Compose path is not a required check (it is
    # heavier and image-dependent). Run it on demand via "Run workflow".
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build the auradb image for the Compose cluster
        # Tag the locally built image as the name docker-compose.cluster.yml
        # references, so Compose uses it without pulling an unpublished tag.
        run: docker build -t ghcr.io/ohswedd/auradb:0.5.2 .

      - name: Generate dev certs, run the cluster, and tear it down
        run: bash scripts/smoke_cluster_compose.sh
