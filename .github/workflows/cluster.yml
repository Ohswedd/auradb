name: Cluster preview

# Exercises the EXPERIMENTAL multi-node server preview: the cross-process peer
# transport, real leader election and replication over loopback TCP sockets, the
# live cluster CLI commands, and the Docker Compose cluster definition.
#
# These tests bind real loopback sockets and use readiness checks with bounded
# polling (no fixed sleeps). They run on push, on PRs, and on demand.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      version:
        description: "Published image tag to smoke against (e.g. 1.0.0)"
        required: false
        default: "1.0.0"
      require_published_connector:
        description: "Fail (don't skip) if the published Aura Connector >=0.4.1,<0.5 is unavailable. Set for release/tag conformance."
        type: boolean
        required: false
        default: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  multi-node:
    name: multi-node preview tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build workspace
        run: cargo build --workspace --all-features

      - name: Peer transport unit tests
        run: cargo test -p auradb-replication transport

      - name: Cross-process Raft + replication (real TCP sockets)
        # Run serially: these are heavy process-level cluster tests (each spawns a
        # multi-threaded runtime and Raft driver tasks). Running them in parallel
        # on a few-core runner can starve a cluster's driver enough to exceed a
        # commit timeout, so serialize them for a stable signal.
        run: cargo test -p auradb-replication --test multi_node -- --test-threads=1

      - name: Long-running cluster tests (manual)
        # The heaviest variants (e.g. 1,000-entry follower catch-up) are
        # `#[ignore]`d so the default suite stays stable under CI parallelism.
        # Run them serially on demand via "Run workflow".
        if: github.event_name == 'workflow_dispatch'
        run: cargo test -p auradb-replication --test multi_node -- --ignored --test-threads=1

      - name: Server-level multi-node preview (AWP routing)
        run: cargo test -p auradb-server --test cluster_preview

      - name: Peer TLS validation (wrong CA / SAN, rotation)
        run: cargo test -p auradb-server --test peer_tls

      - name: Generated dev certs form a real TLS cluster (mutual TLS)
        run: cargo test -p auradb-cli --test peer_tls_cluster

      - name: not_leader ergonomics
        run: cargo test -p auradb-server --test not_leader

      - name: Live cluster CLI commands
        run: cargo test -p auradb-cli --test cluster_cli

      - name: Recovery diagnostics (leader-change, reconnect-storm warnings)
        run: cargo test -p auradb-cli --test cluster_diagnostics

      - name: Validate example configs
        run: |
          cargo run -p auradb-cli -- config validate --config examples/cluster/node1.toml
          cargo run -p auradb-cli -- config validate --config examples/cluster/node2.toml
          cargo run -p auradb-cli -- config validate --config examples/cluster/node3.toml

      - name: Validate Docker Compose cluster definition
        run: docker compose -f docker-compose.cluster.yml config

  local-three-node-smoke:
    name: three-node loopback smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build CLI
        run: cargo build -p auradb-cli

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Start a three-node loopback cluster and elect a leader
        run: |
          set -eu
          ./target/debug/auradb server --config examples/cluster/node1.toml > node1.log 2>&1 &
          ./target/debug/auradb server --config examples/cluster/node2.toml > node2.log 2>&1 &
          ./target/debug/auradb server --config examples/cluster/node3.toml > node3.log 2>&1 &
          ./target/debug/auradb cluster wait-leader --addr 127.0.0.1:7171 --timeout-secs 30
          # Live cluster diagnostics: `cluster status --addr` queries the running
          # server (role, leader, quorum, indices, per-peer state). The offline
          # `cluster status --data-dir` view reads on-disk metadata.
          ./target/debug/auradb cluster status --addr 127.0.0.1:7171 --json
          ./target/debug/auradb status --addr 127.0.0.1:7171 --json
          ./target/debug/auradb cluster leader --addr 127.0.0.1:7171

      - name: Aura Connector cluster conformance (v0.4.x)
        # Drives Aura Connector v0.4.x against the live loopback cluster: leader
        # write, follower not_leader exposing the leader address, reconnect helper,
        # bounded redirect, and transaction-not-redirected. The connector resolves
        # leader/follower client addresses from `auradb cluster leader`.
        #
        # Connector selection: on PR/push this uses the latest published connector
        # in the >=0.4.1,<0.5 line when one is available, and skips with a clear
        # message when it is not (so coordinated work does not block on connector
        # publish timing). For release/tag conformance, set the
        # `require_published_connector` input so a missing/too-old connector FAILS
        # instead of skipping — see docs/CONFORMANCE.md. Until Aura Connector 0.4.1
        # is published, leave it unset.
        env:
          AURA_CONNECTOR_MIN_VERSION: "0.4.1"
          REQUIRE_PUBLISHED_CONNECTOR: ${{ github.event.inputs.require_published_connector || 'false' }}
        run: |
          set -eu
          if ! python -m pip install --upgrade "aura-connector>=0.4.1,<0.5"; then
            if [ "$REQUIRE_PUBLISHED_CONNECTOR" = "true" ]; then
              echo "Aura Connector >=0.4.1,<0.5 is required for release conformance but is not installable."
              exit 1
            fi
            echo "Aura Connector >=0.4.1,<0.5 not installable yet; skipping cluster conformance."
            exit 0
          fi
          # Resolve the leader's client address and pick a follower from the known
          # loopback client ports.
          leader=$(./target/debug/auradb cluster leader --addr 127.0.0.1:7171 --json \
            | python -c "import json,sys; print(json.load(sys.stdin).get('leader_client_addr') or '')")
          if [ -z "$leader" ]; then
            echo "leader client address not reported; skipping."
            exit 0
          fi
          follower=""
          for cand in 127.0.0.1:7171 127.0.0.1:7181 127.0.0.1:7191; do
            if [ "$cand" != "$leader" ]; then follower="$cand"; break; fi
          done
          echo "leader=$leader follower=$follower"
          # Scenario 1-2: connector smoke + full conformance against the leader,
          # using the published 0.4.x connector (these must pass when it installs).
          python tests/conformance/python/run_connector_smoke.py --addr "$leader"
          python tests/conformance/python/run_connector_conformance.py --addr "$leader"
          # Scenario 3: cluster ergonomics across leader + follower.
          set +e
          python tests/conformance/python/run_connector_cluster.py --leader "$leader" --follower "$follower"
          rc=$?
          set -e
          if [ "$rc" -eq 2 ]; then
            if [ "$REQUIRE_PUBLISHED_CONNECTOR" = "true" ]; then
              echo "Aura Connector 0.4.x required for release conformance but reported too old."
              exit 1
            fi
            echo "Aura Connector 0.4.x not available; skipping cluster conformance."
            exit 0
          fi
          exit "$rc"

      - name: Tear down
        if: always()
        run: pkill -f 'auradb server --config examples/cluster' || true

  compose-live-smoke:
    name: Docker Compose live smoke (manual, local image)
    # Opt-in only: the live Docker Compose path is not a required check (it is
    # heavier than the loopback smoke). Run it on demand via "Run workflow".
    # Uses a LOCALLY BUILT image (no registry pull), so it never depends on GHCR
    # publish timing — the recommended preview path.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build the auradb image for the Compose cluster
        run: docker build -t auradb:1.0.0 .

      - name: Generate dev certs, run the cluster, and tear it down
        env:
          AURADB_IMAGE: auradb:1.0.0
        run: bash scripts/smoke_cluster_compose.sh

  published-image-smoke:
    name: Docker Compose live smoke (published GHCR image)
    # Post-release verification: pull the published image and run the same
    # three-node Compose smoke. Manual only, so unreliable GHCR publish timing
    # never blocks a PR. Run after a release tag has published the image.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Inspect the published multi-arch manifest
        run: docker buildx imagetools inspect ghcr.io/ohswedd/auradb:${{ inputs.version }}

      - name: Generate dev certs, run the cluster against the published image
        env:
          AURADB_IMAGE: ghcr.io/ohswedd/auradb:${{ inputs.version }}
        run: bash scripts/smoke_cluster_compose.sh

  ha-candidate-smoke:
    name: HA candidate smoke (manual, local image)
    # v1.0.0 HA release-candidate smoke: build the image locally, stand up a
    # three-node Compose cluster, kill the leader, confirm a new leader accepts a
    # write, rejoin the old leader, and confirm catch-up. This is an HA *candidate*
    # smoke, not production HA proof. Manual only (workflow_dispatch) so it never
    # blocks a PR — see docs/HA_RELEASE_CANDIDATE.md.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build the auradb image for the HA candidate smoke
        run: docker build -t auradb:1.0.0 .

      - name: Run the HA candidate smoke and tear it down
        env:
          AURADB_IMAGE: auradb:1.0.0
        run: bash scripts/smoke_ha_candidate.sh

  published-image-ha-smoke:
    name: HA candidate smoke (published GHCR image)
    # Post-release HA candidate verification against the published image. Manual
    # only, so unreliable GHCR publish timing never blocks a PR. Run after a
    # release tag has published the image. Not production HA proof.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Inspect the published multi-arch manifest
        run: docker buildx imagetools inspect ghcr.io/ohswedd/auradb:${{ inputs.version }}

      - name: Run the HA candidate smoke against the published image
        env:
          AURADB_IMAGE: ghcr.io/ohswedd/auradb:${{ inputs.version }}
        run: bash scripts/smoke_ha_candidate.sh
