name: Benchmarks

# Manual: benchmarks are compute-heavy and run on demand.
on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  bench:
    name: cargo bench
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Compile benchmarks
        run: cargo bench --workspace --benches --no-run

      - name: Run benchmarks (short)
        run: cargo bench --workspace --benches -- --warm-up-time 0.5 --measurement-time 1
