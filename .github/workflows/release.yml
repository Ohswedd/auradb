name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu }
          # Build both macOS targets on Apple Silicon runners (macos-14). The
          # legacy macos-13 Intel runners are deprecated and unreliable; the
          # x86_64 binary is cross-compiled (the toolchain installs the target).
          - { os: macos-14, target: x86_64-apple-darwin }
          - { os: macos-14, target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release -p auradb-cli --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          NAME="auradb-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir -p "dist/$NAME"
          cp "target/${{ matrix.target }}/release/auradb" "dist/$NAME/"
          cp README.md LICENSE AuraDB.toml "dist/$NAME/"
          tar -C dist -czf "dist/$NAME.tar.gz" "$NAME"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $name = "auradb-$env:GITHUB_REF_NAME-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path "dist/$name" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/auradb.exe" "dist/$name/"
          Copy-Item README.md, LICENSE, AuraDB.toml "dist/$name/"
          Compress-Archive -Path "dist/$name" -DestinationPath "dist/$name.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Collect archives and checksums
        run: |
          mkdir -p out
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} out/ \;
          cd out && shasum -a 256 * > SHA256SUMS
          cat SHA256SUMS

      - name: Verify release artifacts
        # All target archives present, SHA256SUMS complete and matching, versioned
        # names, and the host (linux x86_64) binary reports the expected version.
        run: |
          bash scripts/verify_release_artifacts.sh --dir out --version "${GITHUB_REF_NAME#v}"

      - name: Build release notes from changelog
        # Extract the CHANGELOG.md section for this tag's version and use it as the
        # GitHub release body, so the published release is never empty. Fail the
        # release if the section is missing or does not carry the required v1.0
        # support statements (the same wording verify_release_artifacts.sh --tag
        # checks), catching the problem before publishing rather than after.
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            index($0, "## [" ver "]") == 1 { capture = 1; print; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::error::no CHANGELOG.md section found for version $version" >&2
            exit 1
          fi
          body_lc="$(tr '[:upper:]' '[:lower:]' < release-notes.md)"
          missing=""
          printf '%s' "$body_lc" | grep -q "single-node" &&
            printf '%s' "$body_lc" | grep -q "production" ||
            missing="$missing single-node-production-statement"
          printf '%s' "$body_lc" | grep -Eq "preview|not production ha|not production-ha" ||
            missing="$missing multi-node-preview-disclaimer"
          printf '%s' "$body_lc" | grep -Eq "awp 1|aura wire protocol 1" ||
            missing="$missing awp-1-statement"
          printf '%s' "$body_lc" | grep -Eq "storage format v2|storage v2|format v2" ||
            missing="$missing storage-v2-statement"
          printf '%s' "$body_lc" | grep -Eq "known limitation|limitations" ||
            missing="$missing known-limitations"
          if [ -n "$missing" ]; then
            echo "::error::CHANGELOG.md section for $version is missing required statement(s):$missing" >&2
            exit 1
          fi
          echo "release body for $version ($(wc -l < release-notes.md) lines) carries the required statements"
          cat release-notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            out/*.tar.gz
            out/*.zip
            out/SHA256SUMS
