name: Conformance

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  python-awp:
    name: Aura Wire Protocol conformance (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-conformance-${{ hashFiles('**/Cargo.lock') }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build server
        run: cargo build --release -p auradb-cli

      - name: Conformance with auth disabled
        run: |
          ./target/release/auradb server --data-dir .local/c-open --bind 127.0.0.1 --port 7171 &
          SRV=$!
          sleep 2
          python tests/conformance/python/run_conformance.py --addr 127.0.0.1:7171
          kill $SRV

      - name: Conformance with auth enabled
        run: |
          HASH=$(./target/release/auradb auth hash-token --token ci-secret)
          printf 'data_dir = ".local/c-auth"\nbind = "127.0.0.1"\nport = 7172\n\n[auth]\nenabled = true\nmode = "static-token"\ntoken_hash = "%s"\ntoken_hash_algorithm = "argon2id"\n' "$HASH" > .local/auth.toml
          ./target/release/auradb server --config .local/auth.toml &
          SRV=$!
          sleep 2
          # Unauthenticated clients are rejected for data operations.
          if python tests/conformance/python/run_conformance.py --addr 127.0.0.1:7172; then
            echo "ERROR: unauthenticated conformance should have failed"; kill $SRV; exit 1
          fi
          # Authenticated clients pass the full suite.
          python tests/conformance/python/run_conformance.py --addr 127.0.0.1:7172 --auth-token ci-secret
          kill $SRV

      - name: Conformance over TLS
        run: |
          ./target/release/auradb cert generate-dev --out-dir .local/certs
          HASH=$(./target/release/auradb auth hash-token --token ci-secret)
          printf 'data_dir = ".local/c-tls"\nbind = "127.0.0.1"\nport = 7173\n\n[tls]\nenabled = true\ncert_path = ".local/certs/server.crt"\nkey_path = ".local/certs/server.key"\n\n[auth]\nenabled = true\nmode = "static-token"\ntoken_hash = "%s"\ntoken_hash_algorithm = "argon2id"\n' "$HASH" > .local/tls.toml
          ./target/release/auradb server --config .local/tls.toml &
          SRV=$!
          sleep 2
          python tests/conformance/python/run_conformance.py --addr 127.0.0.1:7173 --tls-ca .local/certs/ca.crt --tls-server-name localhost --auth-token ci-secret
          kill $SRV

  connector:
    name: Aura Connector conformance (published client)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build server
        run: cargo build --release -p auradb-cli

      - name: Install Aura Connector (>= 0.6.1, < 0.7)
        run: |
          # Aura Connector 0.6.x is the matching client for AuraDB 1.2.x (query
          # ergonomics: aggregations, terms facets, ranked pagination, cooperative
          # query timeouts). The live facets/pagination/timeouts conformance below
          # requires v0.6.1, which forwards the per-query `timeout_ms` to the wire.
          # Coordinated releases publish the connector first, so this install is
          # required and must succeed; a failure fails the job. For a pre-release run
          # (before 0.6.1 is on PyPI), install the local wheel instead:
          #   python -m pip install ../aura-connector
          python -m pip install --upgrade "aura-connector>=0.6.1,<0.7"
          python -c "import aura; assert aura.__version__ >= '0.6.1', aura.__version__"

      - name: Connector smoke (auth disabled)
        run: |
          ./target/release/auradb server --data-dir .local/smoke --bind 127.0.0.1 --port 7180 &
          SRV=$!
          sleep 2
          python tests/conformance/python/run_connector_smoke.py --addr 127.0.0.1:7180
          kill $SRV

      - name: Connector smoke (auth + TLS)
        run: |
          ./target/release/auradb cert generate-dev --out-dir .local/smoke-certs
          HASH=$(./target/release/auradb auth hash-token --token ci-secret)
          printf 'data_dir = ".local/smoke-tls"\nbind = "127.0.0.1"\nport = 7182\n\n[tls]\nenabled = true\ncert_path = ".local/smoke-certs/server.crt"\nkey_path = ".local/smoke-certs/server.key"\n\n[auth]\nenabled = true\nmode = "static-token"\ntoken_hash = "%s"\ntoken_hash_algorithm = "argon2id"\n' "$HASH" > .local/smoke-tls.toml
          ./target/release/auradb server --config .local/smoke-tls.toml &
          SRV=$!
          sleep 2
          python tests/conformance/python/run_connector_smoke.py --addr 127.0.0.1:7182 --tls-ca .local/smoke-certs/ca.crt --tls-server-name localhost --auth-token ci-secret
          kill $SRV

      - name: Connector conformance (auth disabled)
        run: |
          ./target/release/auradb server --data-dir .local/conn --bind 127.0.0.1 --port 7181 &
          SRV=$!
          sleep 2
          python tests/conformance/python/run_connector_conformance.py --addr 127.0.0.1:7181
          kill $SRV

      - name: Connector search conformance (v1.1.0 search and ranking)
        run: |
          ./target/release/auradb server --data-dir .local/search --bind 127.0.0.1 --port 7184 &
          SRV=$!
          sleep 2
          python tests/conformance/python/run_connector_search.py --addr 127.0.0.1:7184
          kill $SRV

      - name: Connector facets conformance (v1.2 facets and aggregations)
        run: |
          ./target/release/auradb server --data-dir .local/facets --bind 127.0.0.1 --port 7185 &
          SRV=$!
          sleep 2
          python tests/conformance/python/run_connector_facets.py --addr 127.0.0.1:7185
          kill $SRV

      - name: Connector pagination conformance (v1.2 ranked pagination)
        run: |
          ./target/release/auradb server --data-dir .local/pagination --bind 127.0.0.1 --port 7186 &
          SRV=$!
          sleep 2
          python tests/conformance/python/run_connector_pagination.py --addr 127.0.0.1:7186
          kill $SRV

      - name: Connector timeout conformance (v1.2 cooperative query timeouts)
        run: |
          ./target/release/auradb server --data-dir .local/timeouts --bind 127.0.0.1 --port 7187 &
          SRV=$!
          sleep 2
          python tests/conformance/python/run_connector_timeouts.py --addr 127.0.0.1:7187
          kill $SRV

      # NOTE: the cluster variants (run_connector_facets_cluster.py,
      # run_connector_pagination_cluster.py, run_connector_timeouts_cluster.py) are
      # operator-run, not gated here: their leader-change step requires stopping a
      # node, and they seed a large replicated dataset. See docs/CONFORMANCE.md and
      # docs/TESTING.md for how to run them against a local cluster.
