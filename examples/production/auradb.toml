# AuraDB production configuration used by docker-compose.secure.yml.
#
# Authentication and TLS are enabled. The token hash is supplied at runtime
# through the AURADB_AUTH_TOKEN_HASH environment variable (see the compose file
# and examples/production/README.md), so no secret is committed here.
#
# Paths are container paths: the compose file mounts the config, the data
# volume, and the certificate directory.

bind = "0.0.0.0"
port = 7171

data_dir = "/data"

max_payload_bytes = 16777216
cursor_timeout_secs = 120
page_size = 100

sync_on_commit = true
log_level = "info"
log_json = true
metrics_enabled = true

[tls]
enabled = true
cert_path = "/certs/server.crt"
key_path = "/certs/server.key"
# Uncomment to require client certificates (mutual TLS):
# client_ca_path = "/certs/ca.crt"
# require_client_cert = true

[auth]
enabled = true
mode = "static-token"
# token_hash is injected from AURADB_AUTH_TOKEN_HASH at container start; it is
# intentionally not written here so no secret lives in version control.
token_hash_algorithm = "argon2id"
