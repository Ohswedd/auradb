# AuraDB three-node preview cluster — Docker node 1.
#
# EXPERIMENTAL multi-node preview, for local Docker-network testing only.
# Single-node mode remains the recommended production path. See
# docs/CLUSTERING.md.
#
# Because containers communicate over a Docker bridge network (non-loopback),
# this configuration is a "public" cluster and therefore requires:
#   - allow_experimental_public_cluster = true
#   - peer TLS ([cluster.tls])
#   - a shared peer authentication token
# Generate peer certificates whose SANs include the service names
# (node1/node2/node3) before `docker compose up`; see examples/cluster/README.md.

bind = "0.0.0.0"
port = 7171
data_dir = "/data"
max_payload_bytes = 16777216
log_level = "info"
log_json = true
cursor_timeout_secs = 300
page_size = 100
sync_on_commit = true
metrics_enabled = true
# Preview/dev: the client listener binds all interfaces inside the container.
# For a real deployment, enable [auth] and client TLS as in docker-compose.secure.yml.
allow_insecure_bind = true

[tls]
enabled = false

[auth]
enabled = false

[mvcc]
gc_enabled = true
gc_interval_secs = 300
min_retained_versions = 1

[cluster]
enabled = true
experimental_multi_node = true
allow_experimental_public_cluster = true
cluster_id = "0000000000000000000000000000a1a2"
node_id = "00000000000000a1"
listen_addr = "0.0.0.0:7172"
advertise_addr = "node1:7172"
bootstrap = true
# Shared secret; change it. (Kept in the config file like other AuraDB secrets.)
peer_auth_token = "change-me-preview-cluster-token"
peers = [
  { node_id = "00000000000000a2", addr = "node2:7172" },
  { node_id = "00000000000000a3", addr = "node3:7172" },
]

[cluster.tls]
enabled = true
cert_path = "/certs/node1.crt"
key_path = "/certs/node1.key"
ca_path = "/certs/ca.crt"
