bind = "127.0.0.1"
port = 7171
data_dir = ".local/v02-check"
max_payload_bytes = 16777216
log_level = "info"
log_json = false
cursor_timeout_secs = 300
page_size = 100
sync_on_commit = true
metrics_enabled = true

[tls]
enabled = false
require_client_cert = false

[auth]
enabled = false
mode = "static-token"
token_hash_algorithm = "argon2id"

[mvcc]
gc_enabled = true
gc_interval_secs = 300
min_retained_versions = 1
